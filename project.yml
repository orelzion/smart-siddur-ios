name: SmartSiddur
options:
  bundleIdPrefix: com.karriapps
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

targets:
  SmartSiddur:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "**/.gitkeep"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.karriapps.smartsiddurlite
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: "SmartSiddur"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        GIDClientID: "588019731888-mmffrv6ll397fp8bko10in41pdtm17c0.apps.googleusercontent.com"
        GIDServerClientID: "588019731888-aet2ntuciv5o93peaosp9ak9ldmmkqqc.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - "com.googleusercontent.apps.588019731888-mmffrv6ll397fp8bko10in41pdtm17c0"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
